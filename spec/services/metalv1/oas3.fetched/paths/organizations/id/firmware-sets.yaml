get:
  tags:
  - FirmwareSets
  summary: Get Organization's Firmware Sets
  description: Returns all firmware sets associated with the organization.
  operationId: getOrganizationFirmwareSets
  parameters:
  - description: Organization UUID
    in: path
    name: id
    required: true
    schema:
      format: uuid
      type: string
  - name: page
    in: query
    description: page number to return
    schema:
      type: integer
  - name: per_page
    in: query
    description: items returned per page.
    schema:
      type: integer
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/FirmwareSetListResponse.yaml'
    "401":
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
      description: unauthorized
    "403":
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
      description: forbidden
    "404":
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
      description: not found
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/Error.yaml'
